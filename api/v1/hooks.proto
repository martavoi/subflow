syntax = "proto3";

package subflow.hooks.v1;

option go_package = "github.com/martavoi/subflow/api/v1;subflowv1";

import "google/protobuf/timestamp.proto";

service SubscriptionHooks {
  rpc Dispatch (Event) returns (HookAck);
}

message Event {
  string id = 1;
  string type = 2;                            // hook.Type wire name (e.g. "subscription.activated")
  google.protobuf.Timestamp created_at = 3;
  map<string, string> context = 4;
  string subscription_id = 5;
  string user_id = 6;
  string plan_code = 7;
  int32 renewal_count = 8;
  oneof data {
    LifecycleData lifecycle = 9;
    PaymentData payment = 10;
  }
}

message LifecycleData {
  string phase = 1;
  google.protobuf.Timestamp period_start = 2;
  google.protobuf.Timestamp period_end = 3;
}

message PaymentData {
  int32 dunning_attempt = 1;
  int64 amount_cents = 2;
  string currency = 3;
  string transaction_id = 4;
  string failure_reason = 5;
}

message HookAck {}
